<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Uma declaração de amor em forma de página web elegante e romântica." />
    <title>Para Emanueli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <div class="leaf leaf-top-left"></div>
      <div class="leaf leaf-bottom-right"></div>
      <div class="paper-rip rip-left"></div>
      <div class="paper-rip rip-right"></div>
      <div class="particles" id="particles" aria-hidden="true"></div>

      <main class="content">
        <header class="hero" id="hero">
          <p class="top-line" id="typing-top"></p>
          <div class="heart" aria-hidden="true">
            <span></span>
          </div>

          <div class="title-block">
            <p class="subtitle" id="typing-mini"></p>
            <h1 class="main-name" id="typing-name"></h1>
          </div>

          <figure class="photo-frame">
            <img src="foto.jpg" alt="Uma lembrança delicada e romântica" />
          </figure>

          <section class="poem-card" aria-label="Poema romântico">
            <div class="quote quote-left">“</div>
            <p>
              Te amo menina<br />
              <br />
              Onde quer que eu vá<br />
              Seja em qualquer lugar<br />
              Se você estiver lá<br />
              Faz com que tudo ao redor deixe de importar
            </p>
            <div class="quote quote-right">”</div>
          </section>
        </header>

        <footer class="footer">
          <p>Feito com todo o meu amor ❤️</p>
          <span>Para Emanueli.</span>
        </footer>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
